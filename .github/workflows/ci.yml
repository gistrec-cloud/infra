name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ansible + ansible-lint
        run: pip install "ansible-core==2.21.1" "ansible-lint==26.6.0"
      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Stub vault password file
        # ansible.cfg points vault_password_file at the gitignored .vault_pass;
        # without it every syntax-check ansible-lint runs errors out. Nothing
        # vault-encrypted is in the repo, so the value is never used.
        run: echo ci-dummy > ansible/.vault_pass
      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint

  terraform:
    name: terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Check formatting
        run: terraform fmt -check -recursive
      - name: Validate each module
        run: |
          for d in dns aws yandex; do
            echo "== $d =="
            terraform -chdir="$d" init -backend=false
            terraform -chdir="$d" validate
          done

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan git history for secrets
        run: gitleaks detect --source . --redact --verbose
