---
# Master playbook. Run: ansible-playbook site.yml
#
# group_vars/all.vault.yml does NOT auto-load (group_vars matching is by exact
# group name, and there is no group "all.vault"), so both plays pull it in via
# vars_files. First-found list: the real vault, else the example (placeholders)
# so syntax checks and fresh clones still parse.
#
# Play order is dependency order: registry-derived groups first (the firewall
# role's honeypot flag reads `web` membership), then baseline (network,
# firewall) → certificates/runtimes → databases → apps → web layer on top.
- name: Registry-derived groups — apps.yml decides who needs the web stack
  hosts: all
  gather_facts: false
  become: false
  vars_files:
    # Vault too: evaluating `apps` templates its nested {{ vault_* }} refs.
    - ["group_vars/all.vault.yml", "group_vars/all.vault.yml.example"]
    - ["apps.yml", "apps.yml.example"]
  tasks:
    # A host that just lost its final registry vhost is no longer selected by
    # the apps expression below. Keep it in `web` for one final nginx run while
    # its ownership manifest exists; nginx removes the empty manifest after it
    # has deleted the stale vhosts.
    - name: Probe the registry nginx ownership manifest
      ansible.builtin.stat:
        path: "{{ infra_registry_state_dir }}/nginx-vhosts.json"
      register: registry_nginx_manifest
      changed_when: false
      tags: [always]

    # A vhost-bearing app in the registry puts its host into `web`, so a
    # `host:` flip re-homes the whole web stack. A static `web:` group
    # still merges — for warming up a standby before a flip.
    # Runs FIRST: the baseline play's firewall role gates its honeypot jail
    # on `web` membership — when this play sat after the apps play, those
    # tasks silently skipped on every run (caught 2026-07-19).
    - name: Join `web` when the registry gives this host a vhost
      ansible.builtin.group_by:
        key: web
      changed_when: false
      # `always`: a --tags run (e.g. --tags nginx) must still derive the
      # group, or the web play below matches only static members.
      tags: [always]
      when: >-
        registry_nginx_manifest.stat.exists
        or (apps | default({}) | dict2items
            | selectattr('value.host', 'equalto', inventory_hostname)
            | map(attribute='value.vhosts', default=[])
            | flatten | length > 0)

# op-backed inventory lookups are lazy — every evaluation re-runs `op`, one
# Touch ID prompt each. Resolve each token once into localhost's facts; the
# inventory vars serve that fact, falling back to the lookup for ad-hoc runs.
- name: Controller secrets — one op prompt per token per run
  hosts: all
  gather_facts: false
  become: false
  # Pinned for the run_once tasks below: free would race the resolution.
  strategy: linear
  tasks:
    - name: Resolve the CF DNS token (tls role)
      ansible.builtin.set_fact:
        cf_dns_token: "{{ tls_cf_api_token }}"
      run_once: true # noqa: run-once[task]
      delegate_to: localhost
      delegate_facts: true
      no_log: true
      when: tls_cf_api_token is defined
      tags: [tls]

    - name: Resolve the CF firewall token (firewall role)
      ansible.builtin.set_fact:
        cf_firewall_token: "{{ firewall_cf_api_token }}"
      run_once: true # noqa: run-once[task]
      delegate_to: localhost
      delegate_facts: true
      no_log: true
      when: firewall_cf_api_token is defined
      tags: [firewall]

- name: Baseline for every host (monitoring)
  hosts: all
  become: true
  vars_files:
    - ["group_vars/all.vault.yml", "group_vars/all.vault.yml.example"]
    # Deployed-apps registry (gitignored; the example keeps parsing alive).
    - ["apps.yml", "apps.yml.example"]
  roles:
    # Adopted live servers keep their existing users and sshd setup. common
    # (admin user + sshd hardening) is opt-in for freshly provisioned hosts.
    # firewall is opt-in per host: set
    # firewall_managed: true in host_vars AFTER filling
    # firewall_extra_open_tcp_ports / firewall_allow_tcp for everything the
    # host serves (default-drop closes the rest).
    - role: common
      when: common_managed | default(false)
      tags: [common]
    - role: firewall
      when: firewall_managed | default(false)
      tags: [firewall]
    # Mesh membership = wireguard_ip in host_vars (germany-02 has none).
    # After firewall, so the UDP port is open before the tunnel comes up.
    - role: wireguard
      when: wireguard_ip is defined
      tags: [wireguard]
    # Time sync is opt-in: chrony replaces systemd-timesyncd (apt removes it in
    # the same transaction). germany-02 runs it as an agreed exception to its
    # "netdata only" rule — after its 2026-07-17 reboot the hypervisor
    # steps the guest clock and timesyncd can't slew it back fast enough.
    - role: chrony
      when: chrony_managed | default(false)
      tags: [chrony]
    # Break-glass: rescue user whose keys live OUTSIDE any home dir
    # (root-owned /etc/ssh/rescue_keys) — survives home wipes and login-user
    # compromise. Opt-in per host; germany-02 runs it too (2026-07-18
    # exception: emergency access only, still no firewall/system management).
    - role: breakglass
      when: breakglass_managed | default(false)
      tags: [breakglass]
    - role: netdata
      tags: [netdata]
    # App cron jobs come from the apps registry — per app, so a job moves
    # hosts together with its app (edit apps.yml, re-run).
    - role: appcron
      tags: [appcron]

# Provision shared host prerequisites before anything consumes them. In the old
# order ClickHouse tried to copy a certificate issued only in the later web play,
# while apppm2 ran before nodeapp installed pm2; fresh hosts needed a second run.
- name: Host prerequisites — TLS certificates and Node/pm2 runtime
  hosts: all
  become: true
  vars_files:
    - ["group_vars/all.vault.yml", "group_vars/all.vault.yml.example"]
  tasks:
    # TLS is fleet material, not an nginx implementation detail. Issue lineages
    # before MySQL/ClickHouse copy them into their containers. Baseline runs
    # first because the role also grants the netdata user certificate traversal.
    - name: Provision fleet TLS certificates
      ansible.builtin.import_role:
        name: tls
      when: tls_managed | default(false)
      tags: [tls]
    # Runtime-only phase. Legacy node apps are deployed later, after app docker
    # dependencies; registry apps then find pm2 on their first apppm2 pass.
    - name: Install the Node.js and pm2 runtime
      ansible.builtin.import_role:
        name: nodeapp
        tasks_from: runtime
      when: >-
        nodeapp_node_apps | default([]) | length > 0
        or nodeapp_install | default(false)
      tags: [nodeapp]

- name: Database servers — self-hosted MySQL + ClickHouse (Docker)
  hosts: db
  become: true
  vars_files:
    - ["group_vars/all.vault.yml", "group_vars/all.vault.yml.example"]
  roles:
    # Opt-in per host: set mysql_managed: true in host_vars. The role asserts a
    # managed firewall before publishing 3306 (Docker DNAT bypasses the input
    # chain). Replication (primary → replica) rides the WireGuard tunnel, so the
    # baseline play above must have brought wg0 up first. Databases start
    # before the apps that need them.
    - role: mysql
      when: mysql_managed | default(false)
    # ClickHouse (VkAdsTool stats store, moved off russia-02). Same 0.0.0.0-publish
    # assert; publishes plaintext on loopback and TLS (9440/8443) publicly. Its
    # certificate lineage already exists from the prerequisite play above.
    - role: clickhouse
      when: clickhouse_managed | default(false)

- name: Applications — docker dependencies, pm2 apps, static bundles
  hosts: all
  become: true
  vars_files:
    - ["group_vars/all.vault.yml", "group_vars/all.vault.yml.example"]
    - ["apps.yml", "apps.yml.example"]
  tasks:
    # Everything below is driven by the apps registry and is a no-op on hosts
    # with no matching apps (germany-02 stays untouched). appdocker runs first:
    # app containers (tg-bot-api, ...) are dependencies of the apps.
    - name: Converge app container dependencies
      ansible.builtin.import_role:
        name: appdocker
      tags: [appdocker]
    # Host-vars-driven legacy apps share the early node runtime. Keep them after
    # docker dependencies and before registry apps/nginx.
    - name: Converge legacy node applications
      ansible.builtin.import_role:
        name: nodeapp
        tasks_from: apps
      when: nodeapp_node_apps | default([]) | length > 0
      tags: [nodeapp]
    - name: Converge registry-managed pm2 applications
      ansible.builtin.import_role:
        name: apppm2
      tags: [apppm2]
    - name: Converge registry-managed static applications
      ansible.builtin.import_role:
        name: appstatic
      tags: [appstatic]

- name: Web servers — nginx reverse proxy
  hosts: web
  become: true
  vars_files:
    - ["group_vars/all.vault.yml", "group_vars/all.vault.yml.example"]
    # Deployed-apps registry: nginx takes per-app vhost file lists from it.
    - ["apps.yml", "apps.yml.example"]
  roles:
    # Per-zone wildcard certs already exist from the prerequisite play, so nginx
    # can enable every registry vhost on this first converge.
    - role: nginx
      tags: [nginx]
