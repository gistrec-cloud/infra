[defaults]
inventory            = inventory/hosts.yml
roles_path           = roles
host_key_checking    = True
retry_files_enabled  = False
# community.general.yaml callback was removed in community.general 12; the
# built-in default callback renders the same yaml via callback_result_format.
stdout_callback      = ansible.builtin.default
callback_result_format = yaml
interpreter_python   = auto_silent
forks                = 10
# Executable script (gitignored) that prints the vault password — reads it
# from 1Password (op CLI), so runs need no --ask-vault-pass.
vault_password_file  = .vault_pass

[privilege_escalation]
become        = True
become_method = sudo

[ssh_connection]
pipelining = True
