    template: clear_transcript_bot_healthcheck
          on: httpcheck.status
chart labels: _collect_job=cleartranscript
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: botcrit
        info: ClearTranscriptBot /healthcheck is failing (HTTP 503, refused, or timeout) for 1m
