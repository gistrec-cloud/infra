# Fleet liveness alarms: russia-01 probes every peer's nginx /health over wg0
# (netdata_httpcheck_jobs `health_*` in host_vars/russia-01.yml). One probe =
# host + nginx + wg tunnel in a single check. Needed because the stock
# httpcheck_web_service_up template is `to: silent` and never notifies.
# finland-01 watches russia-01 back on the separate watch_* prefix — see
# fleet-watch.conf for why the prefixes must differ.
    template: fleet_health_down
          on: httpcheck.status
chart labels: _collect_job=health_*
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: fleetcrit
        info: fleet /health probe ${label:url} is failing (down, refused, or timeout) for 1m
