# aleksandravoo liveness /api/health (PR gistrec/aleksandravoo#40): bare Next.js
# 200, no deps — its ONLY liveness signal (next-server has no project path in the
# cmdline, so no pm2 group). Runs on finland-01 (prod :5000, staging :5050); the
# probe job lives in finland's host_vars and streams here, so this parent-side
# alarm binds aleksandravoo_* (picks up staging when it's added). success<1 → sysadmin.
    template: aleksandravoo_health_down
          on: httpcheck.status
chart labels: _collect_job=aleksandravoo_*
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: sysadmin
        info: aleksandravoo ${label:_collect_job} /api/health is failing (Next.js down, refused, or timeout) for 1m
