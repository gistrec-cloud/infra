# trade-lab httpcheck alarms. The 5 probes in host_vars/russia-01.yml
# (trade_lab_*) were collected but had NO alarm bound, so a stalled bot never
# paged (the stock httpcheck template is `to: silent`). The stdlib health server
# encodes its deep verdict as the HTTP status — 503 when the journal is stale or
# the daily live-cycle is missed/failed — so success<1 IS the alarm.
# The streamlit dashboard (/_stcore/health) is read-only observability, so its
# probe is WARN not CRIT: a dashboard pm2 restart must not page.
    template: trade_lab_probe_down
          on: httpcheck.status
chart labels: _collect_job=!*_dashboard trade_lab_*
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 3m multiplier 1.5 max 1h
          to: sysadmin
        info: trade-lab probe ${label:_collect_job} is failing (503, refused, or timeout) for 1m

    template: trade_lab_dashboard_down
          on: httpcheck.status
chart labels: _collect_job=trade_lab_dashboard
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        warn: $this < 1
       delay: down 5m multiplier 1.5 max 1h
          to: sysadmin
        info: trade-lab streamlit dashboard (/_stcore/health) is down for 1m
