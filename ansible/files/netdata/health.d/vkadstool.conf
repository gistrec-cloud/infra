# vkadstool deep /health (PR gistrec/VkAdsTool#152): async, MySQL + ClickHouse
# SELECT 1 run concurrently, fully bounded (pool 1s / driver 2s / wait_for 3s) →
# 503 on any dep failure. success<1 → sysadmin (tier-2). Single process (the
# schedulers + telegram bot are in-process threads), so one probe covers the app.
# Parent-only (russia-01 evaluates its own httpcheck jobs).
    template: vkadstool_health_down
          on: httpcheck.status
chart labels: _collect_job=vkadstool
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: sysadmin
        info: vkadstool /health is failing (MySQL/ClickHouse down, 503, refused, or timeout) for 1m
