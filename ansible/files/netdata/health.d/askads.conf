# askads /api/health alarms. Two deployments run identical code: askads-ru on
# russia-01:8077 (job askads_ru, local) and askads-cloud on finland-01:8078
# (job askads_cloud, streamed here). Both httpcheck jobs return 503 when the
# app's MySQL SELECT 1 fails, so success<1 is the alarm. Deployed on the netdata
# parent ONLY: it evaluates the streamed askads_cloud chart too, so binding
# askads_* here covers both without finland double-notifying.
    template: askads_health_down
          on: httpcheck.status
chart labels: _collect_job=askads_*
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: sysadmin
        info: askads ${label:_collect_job} /api/health is failing (503, refused, or timeout) for 1m
