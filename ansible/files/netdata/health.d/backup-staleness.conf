# Backup freshness: the mysql/clickhouse backup scripts touch a `.last-success`
# marker only on a clean run, so its age flags a stalled or failing backup. Bound
# to the go.d filecheck jobs named *_backup; evaluated on the parent only.
# VERIFY at first deploy — filecheck's mtime context/dimension name varies by
# netdata version: `curl -s localhost:19999/api/v1/charts | grep filecheck`, then
# match `on:` / `of` below.
    template: backup_marker_stale
          on: filecheck.file_time_since_modification
chart labels: _collect_job=*_backup
       class: Errors
        type: System
   component: Backup
      lookup: max -2m of time_since_modification
       units: seconds
       every: 5m
        warn: $this > (30 * 3600)
        crit: $this > (50 * 3600)
       delay: down 1h
          to: sysadmin
        info: backup .last-success marker (${label:_collect_job}) is stale — the backup has stalled or is failing
