# Backup freshness. The mysql / clickhouse backup scripts touch a `.last-success`
# marker only on a fully clean run, so the marker's AGE is a single signal that
# catches both a stalled schedule (timer stopped, host wedged) and a repeatedly
# failing backup — exactly the "silent backup rot" the S3 restore-drill caught by
# hand (2026-07-21, off-site was 9/19 dbs). Bound to the go.d filecheck jobs named
# *_backup (netdata_filecheck_files on the backup host); the parent evaluates the
# streamed child chart, so this file installs on the parent only.
#
# VERIFY on first deploy — go.d filecheck's modification-time context/dimension
# name varies by netdata version. On the backup host:
#   curl -s localhost:19999/api/v1/charts | python3 -c \
#     'import json,sys; print([c for c in json.load(sys.stdin)["charts"] if "filecheck" in c])'
# then match `on:` and the `of <dim>` below (thresholds are seconds).
    template: backup_marker_stale
          on: filecheck.file_time_since_modification
chart labels: _collect_job=*_backup
       class: Errors
        type: System
   component: Backup
      lookup: max -2m of time_since_modification
       units: seconds
       every: 5m
        warn: $this > (30 * 3600)
        crit: $this > (50 * 3600)
       delay: down 1h
          to: sysadmin
        info: backup .last-success marker (${label:_collect_job}) is stale — the backup has stalled or is failing
