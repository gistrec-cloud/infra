# Reverse watch: finland-01 probes russia-01's /health over wg0. russia-01 is
# the netdata parent AND the fleet prober — if it dies, nothing else would
# notify; this alarm fires from finland-01's own health engine.
# Deployed ONLY on finland-01, and on a distinct watch_* job prefix: the
# parent evaluates health templates against streamed child charts too, so a
# shared health_* prefix would make russia-01 double-notify on this chart.
    template: fleet_watch_down
          on: httpcheck.status
chart labels: _collect_job=watch_*
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: fleetcrit
        info: fleet /health watch ${label:url} (the netdata parent) is failing (down, refused, or timeout) for 1m
