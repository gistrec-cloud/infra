# loquia deep /health — tier-1, per-process: admin (9091) + both language bots on
# their WEB_PORTs (9090/9092). PR gistrec/Loquia#2 makes each run a bounded DB
# SELECT 1 (asyncio.wait_for 3s) → 503 on DB failure, so success<1 is the alarm.
# Routed to botcrit (phone): the bots are user-facing and a group pm2 check can't
# see one language die. Parent-only (russia-01 evaluates its own httpcheck jobs).
    template: loquia_health_down
          on: httpcheck.status
chart labels: _collect_job=loquia_*
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: botcrit
        info: loquia ${label:_collect_job} /health is failing (503, refused, or timeout) for 1m
