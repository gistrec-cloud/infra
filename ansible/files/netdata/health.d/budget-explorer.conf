# budget-explorer liveness /health (PR gistrec/budget-explorer#5): bare 200, no
# deps (stays 200 through DB blips — pm2 autorestart owns the process). Catches
# "web process hung / not answering"; the pm2_budget-explorer group already covers
# "process gone". success<1 → sysadmin (rest tier). Parent-only.
    template: budget_explorer_health_down
          on: httpcheck.status
chart labels: _collect_job=budget_explorer
       class: Errors
        type: Web Server
   component: HTTP endpoint
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 2m multiplier 1.5 max 1h
          to: sysadmin
        info: budget-explorer /health is failing (web process down/hung, refused, or timeout) for 1m
