---
# Non-secret defaults shared by all hosts.
# Secrets belong in group_vars/all.vault.yml (gitignored, ansible-vault encrypted).

timezone: Etc/UTC

# Roles driven by apps.yml keep tiny ownership manifests here. Reconciliation
# removes only names that a role recorded itself. App cron markers explicitly
# present in the registry are also owned; unrelated cron, pm2 and nginx entries
# stay untouched.
infra_registry_state_dir: /var/lib/gistrec-infra

# --- common role ---
# Admin/app user = the actual SSH login user per host (gistrec / vk-ads-tool),
# retiring the separate "deploy" service account (Phase 2). nodeapp_node_apps is
# empty so the nodeapp role is skipped; the real apps run under the login user
# (managed outside this repo). The leftover deploy user still lingers on the hosts
# until removed there — see the userdel/pm2-deploy cleanup step.
admin_user: "{{ ansible_user }}"
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"

# --- netdata role ---
netdata_bind_to: "127.0.0.1"
# Telegram delivery for health alerts (empty = alerts stay dashboard-only).
netdata_telegram_bot_token: "{{ vault_netdata_telegram_bot_token | default('') }}"
netdata_telegram_chat_id: "{{ vault_netdata_telegram_chat_id | default('') }}"
# Pushover escalation (replaced the Twilio SMS path 2026-07-19). The
# role→user-key map lives in the vault — user keys stay out of git.
netdata_pushover_token: "{{ vault_pushover_app_token | default('') }}"
netdata_pushover_roles: "{{ vault_netdata_pushover_roles | default({}) }}"
# Streaming: shared parent/child API key (per-host role set in host_vars).
netdata_stream_api_key: "{{ vault_netdata_stream_api_key | default('') }}"
# Dashboard node names follow the inventory (fleet names), not the machine
# hostnames — those keep pre-rename values (see terraform/yandex/compute.tf).
netdata_hostname: "{{ inventory_hostname }}"

# --- Cloudflare edge ranges (www.cloudflare.com/ips, synced 2026-07-19) ---
# Single source for two consumers: the nginx realip snippet (restore the real
# client IP behind the CF proxy) and the fail2ban ignoreip safety net. Without
# realip the honeypot jail bans $remote_addr = the CF edge node — a self-DoS
# for every proxied vhost on the host (87 of 122 live bans on russia-01 were
# CF edges when this landed).
cloudflare_edge_ranges:
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22
  - "2400:cb00::/32"
  - "2606:4700::/32"
  - "2803:f800::/32"
  - "2405:b500::/32"
  - "2405:8100::/32"
  - "2a06:98c0::/29"
  - "2c0f:f248::/32"
