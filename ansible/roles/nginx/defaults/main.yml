---
# List of reverse-proxy vhosts; usually set per host in host_vars/.
# Each item: { server_name, upstream_port, tls (bool, optional) }
nginx_sites: []

# Set certbot_email (e.g. in host_vars) to enable Let's Encrypt issuance.

# htpasswd files the verbatim vhosts reference (auth_basic_user_file):
# path → content, vault refs in the gitignored inventory (all: vars:), e.g.
#   /etc/nginx/.htpasswd: "{{ vault_htpasswd_stats }}"
# Nothing else recreates them, and nginx -t passes without the file (opened
# per request) — a rebuilt host would serve 500s to every authed request.
nginx_htpasswd_files: {}
