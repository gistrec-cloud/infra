# ACME challenges and security.txt live under /.well-known/ — the only
# dot-path that must stay reachable. ^~ prefix wins over the regex below.
location ^~ /.well-known/ {
	try_files $uri =404;
}

# Block access to the remaining dotfiles (.git, .env, .ssh, etc.) with 403 —
# a deliberate "forbidden" for trap paths, distinct from the honest 404 that
# ordinary missing pages return. Must be included AFTER honeypot.conf — nginx
# picks the first matching regex location, and honeypot patterns need to log
# before this catches them.
location ~ /\. {
	return 403;
}
