# Only the ACME webroot path is served from disk; the rest of /.well-known/
# (OAuth discovery, app challenges) falls through to the vhost's own
# locations — never intercept it.
location ^~ /.well-known/acme-challenge/ {
	try_files $uri =404;
}

# Deliberate 403 for dotfiles (.git, .env, .ssh) — distinct from the honest
# 404 of missing pages. Include AFTER honeypot.conf: its patterns log first.
location ~ /\.(?!well-known/) {
	return 403;
}
