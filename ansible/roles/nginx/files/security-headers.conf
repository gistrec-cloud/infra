# Shared security headers for TLS server blocks (include at server level).
# NOTE nginx add_header inheritance: a location that sets its OWN add_header
# drops all of these for that location — keep that in mind for special
# locations (SSE, cache-control on static assets).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "DENY" always;
