# log_format для snippet honeypot.conf (access_log в honeypot.log). Должен быть
# в http{} — подключается через include conf.d/*.conf до sites-enabled.
# Канонический формат для всего флота (богатая версия с russia-02): IP, время
# и что именно сканировали.
log_format honeypot '$remote_addr - [$time_local] "$request"';
