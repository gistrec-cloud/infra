---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Install certbot (nginx plugin)
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Install shared nginx snippets (honeypot, deny-dotfiles, security headers)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/nginx/snippets/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop: [honeypot.conf, deny-dotfiles.conf, security-headers.conf]
  notify: Reload nginx

- name: Install the honeypot log_format (http scope, via conf.d)
  ansible.builtin.copy:
    src: honeypot-logformat.conf
    dest: /etc/nginx/conf.d/honeypot-logformat.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Install the Cloudflare realip snippet (http scope, via conf.d)
  ansible.builtin.template:
    src: cloudflare-realip.conf.j2
    dest: /etc/nginx/conf.d/cloudflare-realip.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

# Verbatim vhost files declared per app in the apps registry (vhosts: [...]),
# stored in files/vhosts/<name>.conf (gitignored — real domains). No
# templating: what you saved is what runs. NOTE: the files reference
# /etc/letsencrypt/live/<cert>/ paths — on a fresh host issue the
# certificates BEFORE enabling these vhosts, or nginx -t below fails.
- name: Collect vhost files for this host from the apps registry
  ansible.builtin.set_fact:
    nginx_vhost_files: >-
      {{ apps | default({}) | dict2items
         | selectattr('value.host', 'equalto', inventory_hostname)
         | selectattr('value.vhosts', 'defined')
         | map(attribute='value.vhosts') | flatten }}

# no_log: the values are credential hashes. group www-data — workers read
# the file per request.
- name: Install htpasswd files the vhosts reference
  ansible.builtin.copy:
    content: "{{ item.value }}"
    dest: "{{ item.key }}"
    owner: root
    group: www-data
    mode: "0640"
  loop: "{{ nginx_htpasswd_files | dict2items }}"
  no_log: true
  notify: Reload nginx

# Deployed without the .conf suffix — matching the hand-made files already
# on the hosts, so adopting an existing vhost overwrites it in place instead
# of leaving a duplicate server block behind.
- name: Deploy vhost files (verbatim)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/vhosts/{{ item }}.conf"
    dest: "/etc/nginx/sites-available/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_vhost_files }}"
  notify: Reload nginx

- name: Enable vhost files
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item }}"
    dest: "/etc/nginx/sites-enabled/{{ item }}"
    state: link
    # Adoption: hand-made vhosts live in sites-enabled as REGULAR files under
    # the same names — replace them with the symlink.
    force: true
  loop: "{{ nginx_vhost_files }}"
  notify: Reload nginx

# BEFORE the vhost template: its 443 block references the lineage. certonly
# authenticates on the running nginx via a temporary config and never edits
# our files (the installer flavour did — and the template then wiped it).
- name: Obtain TLS certificates via certbot (certonly — the template owns the vhost)
  ansible.builtin.command: >-
    certbot certonly --nginx --non-interactive --agree-tos
    -m {{ certbot_email }}
    -d {{ item.server_name }}
  args:
    creates: "/etc/letsencrypt/live/{{ item.server_name }}/fullchain.pem"
  changed_when: true
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.server_name }}"
  when:
    - certbot_email is defined
    - item.tls | default(false)
  notify: Reload nginx

- name: Deploy vhost config
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.server_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.server_name }}"
  notify: Reload nginx

- name: Enable vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.server_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.server_name }}.conf"
    state: link
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.server_name }}"
  notify: Reload nginx

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

# ── 443 catch-all: an unknown SNI must not land on whichever vhost sorts
# first alphabetically (that block would answer with a real site under a
# mismatched certificate). ssl_reject_handshake needs nginx >= 1.19.4; older
# nginx must present a real certificate, so the template borrows the first
# tls_zones lineage instead.
- name: Detect the nginx version (picks the 443 catch-all flavour)
  ansible.builtin.command: nginx -v
  register: nginx_version_probe
  changed_when: false
  # A fresh-host --check has no nginx binary yet (apt won't install in
  # check mode) — degrade to "catch-all skipped", don't abort the dry run.
  failed_when: false
  # nginx prints the version to stderr; run in --check too — the catch-all
  # template below cannot render without it.
  check_mode: false

- name: Parse the nginx version
  ansible.builtin.set_fact:
    nginx_version: "{{ nginx_version_probe.stderr | regex_search('nginx/([0-9.]+)', '\\1') | first }}"
  when: nginx_version_probe.rc == 0

# Old nginx needs the borrowed certificate on disk or nginx -t below fails.
# The tls role runs BEFORE nginx in site.yml's web play, so normally the
# lineage already exists — but tls is opt-in (tls_managed), so on a fresh
# host without it: probe, and skip the catch-all rather than break the run.
- name: Probe the borrowed catch-all certificate (pre-1.19.4 nginx only)
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ tls_zones | list | first }}/fullchain.pem"
  register: nginx_catchall_cert
  when:
    - nginx_version is defined
    - nginx_version is version('1.19.4', '<')
    - tls_zones | default({}) | length > 0

- name: Deploy the 443 catch-all vhost
  ansible.builtin.template:
    src: catchall-443.conf.j2
    dest: /etc/nginx/sites-available/catchall-443.conf
    owner: root
    group: root
    mode: "0644"
  when: >-
    nginx_version is defined
    and (nginx_version is version('1.19.4', '>=')
         or nginx_catchall_cert.stat.exists | default(false))
  notify: Reload nginx

- name: Enable the 443 catch-all vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/catchall-443.conf
    dest: /etc/nginx/sites-enabled/catchall-443.conf
    state: link
    # force: the src doesn't exist yet in --check runs (template not applied).
    force: true
  when: >-
    nginx_version is defined
    and (nginx_version is version('1.19.4', '>=')
         or nginx_catchall_cert.stat.exists | default(false))
  notify: Reload nginx

# Fleet-wide /health (see the template header for the server_name trick).
- name: Deploy health vhost
  ansible.builtin.template:
    src: health.conf.j2
    dest: /etc/nginx/sites-available/health.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable health vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/health.conf
    dest: /etc/nginx/sites-enabled/health.conf
    state: link
    # force: the src doesn't exist yet in --check runs (template not applied).
    force: true
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

# Handlers normally flush at end of play — but a failure in a LATER role
# aborts the host and silently drops the pending reload, leaving workers
# on the old config (bit us twice: finland 2026-07-18, germany reverse
# move same day). Flush right here instead.
- name: Apply pending nginx reload now
  ansible.builtin.meta: flush_handlers
