---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Install certbot (nginx plugin)
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Install shared nginx snippets (honeypot, deny-dotfiles, security headers)
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/nginx/snippets/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop: [honeypot.conf, deny-dotfiles.conf, security-headers.conf]
  notify: Reload nginx

- name: Install the honeypot log_format (http scope, via conf.d)
  ansible.builtin.copy:
    src: honeypot-logformat.conf
    dest: /etc/nginx/conf.d/honeypot-logformat.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Install the Cloudflare realip snippet (http scope, via conf.d)
  ansible.builtin.template:
    src: cloudflare-realip.conf.j2
    dest: /etc/nginx/conf.d/cloudflare-realip.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

# Verbatim vhost files declared per app in the apps registry (vhosts: [...]),
# stored in files/vhosts/<name>.conf (gitignored — real domains). No
# templating: what you saved is what runs. NOTE: the files reference
# /etc/letsencrypt/live/<cert>/ paths — on a fresh host issue the
# certificates BEFORE enabling these vhosts, or nginx -t below fails.
- name: Collect vhost files for this host from the apps registry
  ansible.builtin.set_fact:
    nginx_vhost_files: >-
      {{ apps | default({}) | dict2items
         | selectattr('value.host', 'equalto', inventory_hostname)
         | selectattr('value.vhosts', 'defined')
         | map(attribute='value.vhosts') | flatten }}

# Deployed without the .conf suffix — matching the hand-made files already
# on the hosts, so adopting an existing vhost overwrites it in place instead
# of leaving a duplicate server block behind.
- name: Deploy vhost files (verbatim)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/vhosts/{{ item }}.conf"
    dest: "/etc/nginx/sites-available/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_vhost_files }}"
  notify: Reload nginx

- name: Enable vhost files
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item }}"
    dest: "/etc/nginx/sites-enabled/{{ item }}"
    state: link
    # Adoption: hand-made vhosts live in sites-enabled as REGULAR files under
    # the same names — replace them with the symlink.
    force: true
  loop: "{{ nginx_vhost_files }}"
  notify: Reload nginx

# Runs BEFORE the vhost template lands: the template renders the 443 block
# for tls: sites, and nginx -t fails on a missing lineage. certonly with the
# nginx authenticator solves the challenge on the running server (temporary
# config, fresh host serves the stock default site at this point) and never
# edits our files — the installer flavour used to append a 443 block that the
# next template run silently wiped. A tls: true site without certbot_email
# now dies loudly at nginx -t instead of silently serving plain HTTP.
- name: Obtain TLS certificates via certbot (certonly — the template owns the vhost)
  ansible.builtin.command: >-
    certbot certonly --nginx --non-interactive --agree-tos
    -m {{ certbot_email }}
    -d {{ item.server_name }}
  args:
    creates: "/etc/letsencrypt/live/{{ item.server_name }}/fullchain.pem"
  changed_when: true
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.server_name }}"
  when:
    - certbot_email is defined
    - item.tls | default(false)
  notify: Reload nginx

- name: Deploy vhost config
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.server_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.server_name }}"
  notify: Reload nginx

- name: Enable vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.server_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.server_name }}.conf"
    state: link
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.server_name }}"
  notify: Reload nginx

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

# Fleet-wide /health (see the template header for the server_name trick).
- name: Deploy health vhost
  ansible.builtin.template:
    src: health.conf.j2
    dest: /etc/nginx/sites-available/health.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable health vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/health.conf
    dest: /etc/nginx/sites-enabled/health.conf
    state: link
    # force: the src doesn't exist yet in --check runs (template not applied).
    force: true
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

# Handlers normally flush at end of play — but a failure in a LATER role
# aborts the host and silently drops the pending reload, leaving workers
# on the old config (bit us twice: finland 2026-07-18, germany reverse
# move same day). Flush right here instead.
- name: Apply pending nginx reload now
  ansible.builtin.meta: flush_handlers
