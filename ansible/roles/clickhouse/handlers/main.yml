---
# --force-recreate so a changed config.d/users.d bind mount or compose spec is
# actually applied — a plain `up -d` is a no-op when the spec is unchanged.
# --wait blocks until the container is healthy again.
- name: Recreate clickhouse container
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate --wait --wait-timeout 180
    chdir: "{{ clickhouse_base_dir }}"
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
