---
- name: Assert this host has a WireGuard identity
  ansible.builtin.assert:
    that:
      - wireguard_ip is defined
      - wireguard_private_key | length > 0
    fail_msg: >-
      Set wireguard_ip in host_vars and vault_wg_privkey_{{ inventory_hostname | replace('-', '_') }}
      in the vault. Generate a keypair with `wg genkey | tee priv | wg pubkey`.
    quiet: true

- name: Install WireGuard
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: true

# no_log: the rendered config contains this host's private key.
- name: Render the WireGuard config
  ansible.builtin.template:
    src: wg.conf.j2
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Sync wireguard config

- name: Enable and start wg-quick
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: true
    state: started
