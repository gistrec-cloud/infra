---
- name: Derive paths — {{ apppm2_app.key }}
  ansible.builtin.set_fact:
    apppm2_home: "/home/{{ admin_user }}"
    apppm2_dir: >-
      {{ '/home/' ~ admin_user ~ ('' if apppm2_app.value.dir | default('.') == '.'
         else '/' ~ apppm2_app.value.dir) }}

# ── code ──
# repo_dir: clone destination when the repo root is ABOVE the app cwd
# (recepter: repo at ~/backend, cwd backend/back).
- name: Check the code directory — {{ apppm2_app.key }}
  ansible.builtin.stat:
    path: "{{ apppm2_home }}/{{ apppm2_app.value.process.repo_dir | default(apppm2_app.value.dir) }}"
  register: apppm2_code
  when: apppm2_app.value.process.type == 'clone'

# Clone ONLY into a missing directory: several live deployments are rsync
# copies without .git (aleksandravoo, budget-explorer) — the git module would
# fail on them, and they already carry the running code. Adopt, don't touch.
# No version pin on purpose: we clone the default branch tip once; updates
# are owned by CI / manual flows.
- name: Clone the repository, only if absent — {{ apppm2_app.key }} # noqa: latest
  ansible.builtin.git:
    repo: "git@github.com:{{ apppm2_app.value.repo }}.git"
    dest: "{{ apppm2_home }}/{{ apppm2_app.value.process.repo_dir | default(apppm2_app.value.dir) }}"
    update: false
    accept_newhostkey: true
  become: true
  become_user: "{{ admin_user }}"
  when:
    - apppm2_app.value.process.type == 'clone'
    - apppm2_app.value.repo is defined
    - not (apppm2_code.stat.exists | default(true))

- name: Application directory for CI artifacts — {{ apppm2_app.key }}
  ansible.builtin.file:
    path: "{{ apppm2_dir }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  when: apppm2_app.value.process.type == 'artifact'

# ── runtime ──
- name: Python venv — {{ apppm2_app.key }}
  ansible.builtin.command:
    cmd: "python3 -m venv {{ apppm2_app.value.process.venv | default('.venv') }}"
    chdir: "{{ apppm2_dir }}"
    creates: "{{ apppm2_dir }}/{{ apppm2_app.value.process.venv | default('.venv') }}"
  become: true
  become_user: "{{ admin_user }}"
  register: apppm2_venv
  when: apppm2_app.value.process.runtime | default('') == 'python'

- name: Pip install requirements — {{ apppm2_app.key }}
  ansible.builtin.command:
    cmd: "{{ apppm2_app.value.process.venv | default('.venv') }}/bin/pip install -r requirements.txt"
    chdir: "{{ apppm2_dir }}"
  become: true
  become_user: "{{ admin_user }}"
  changed_when: true
  when:
    - apppm2_app.value.process.runtime | default('') == 'python'
    - apppm2_venv is changed

- name: Npm ci — {{ apppm2_app.key }}
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ apppm2_dir }}"
    creates: "{{ apppm2_dir }}/node_modules"
  become: true
  become_user: "{{ admin_user }}"
  when: apppm2_app.value.process.runtime | default('') == 'node'

# ── env files from the 1Password dotenv backups ──
# .env -> "dotenv <app>"; .env.en -> "dotenv <app>-en"; prod.env -> "dotenv <app>-prod"
# The pipe lookup strips trailing newlines — put exactly one back, or every
# host file (ending with \n, as text files do) reports a permanent diff.
#
# Restore-only: every op lookup runs in its own forked worker, which 1Password
# treats as a NEW client — one Touch ID per file, on every converge. Secrets
# flow host -> 1P (backup-envs.sh), so re-pulling existing files buys nothing;
# fetch only what is missing. -e apppm2_env_refresh=true forces the pull
# (deliberate 1P-wins restore). The per-item `when` is evaluated before the
# content lookup, so skipped files never invoke op.
- name: Check which env files already exist — {{ apppm2_app.key }}
  ansible.builtin.stat:
    path: "{{ apppm2_dir }}/{{ item }}"
  register: apppm2_env_stat
  loop: "{{ apppm2_app.value.env if apppm2_app.value.env is defined else ['.env'] }}"

- name: Env files from 1Password — {{ apppm2_app.key }}
  ansible.builtin.copy:
    content: >-
      {{ lookup('ansible.builtin.pipe',
                'op document get ' ~
                ('dotenv ' ~ apppm2_app.key ~
                 ('' if item.item == '.env' else '-' ~
                  (item.item | regex_replace('^\.env\.', '') | regex_replace('\.env$', ''))))
                | quote ~ ' --vault "Gistrec Cloud"') ~ '\n' }}
    dest: "{{ apppm2_dir }}/{{ item.item }}"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"
  loop: "{{ apppm2_env_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: apppm2_env_refresh | default(false) or not item.stat.exists
  no_log: true

# After env restore: a Next.js build bakes NEXT_PUBLIC_* and `prisma generate`
# reads the datasource. shell (not command): build strings chain with && / |.
# Idempotent via build_creates (e.g. .next) so it fires on a cold host /
# migration, not every converge — CI owns rebuilds.
- name: Build after install — {{ apppm2_app.key }} # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: "{{ apppm2_app.value.process.build }}"
    chdir: "{{ apppm2_dir }}"
    creates: >-
      {{ (apppm2_dir ~ '/' ~ apppm2_app.value.process.build_creates)
         if apppm2_app.value.process.build_creates is defined else omit }}
  become: true
  become_user: "{{ admin_user }}"
  changed_when: true
  when: apppm2_app.value.process.build is defined

- name: Bin directory for control scripts — {{ apppm2_app.key }}
  ansible.builtin.file:
    path: "{{ apppm2_home }}/bin"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  when: apppm2_app.value.control_scripts | default([]) | length > 0

- name: Control scripts for forced commands — {{ apppm2_app.key }}
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/bin/{{ item }}"
    dest: "{{ apppm2_home }}/bin/{{ item }}"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop: "{{ apppm2_app.value.control_scripts | default([]) }}"

# ── pm2 ──
- name: Check the ecosystem file — {{ apppm2_app.key }}
  ansible.builtin.stat:
    path: "{{ apppm2_dir }}/{{ apppm2_app.value.process.ecosystem | default('ecosystem.config.js') }}"
  register: apppm2_eco
  when: apppm2_app.value.process.pm2 | default([]) | length > 0

- name: Start missing pm2 processes — {{ apppm2_app.key }}
  ansible.builtin.command:
    cmd: >-
      pm2 startOrReload {{ apppm2_app.value.process.ecosystem | default('ecosystem.config.js') }}
      --only {{ apppm2_missing | join(',') }}
    chdir: "{{ apppm2_dir }}"
  become: true
  become_user: "{{ admin_user }}"
  changed_when: true
  vars:
    apppm2_missing: >-
      {{ apppm2_app.value.process.pm2 | default([])
         | difference(apppm2_current_processes) }}
  when:
    - apppm2_app.value.process.pm2 | default([]) | length > 0
    - apppm2_eco.stat.exists | default(false)
    - apppm2_missing | length > 0
  notify: Save pm2 process list

- name: Warn when pm2 apps are declared without an ecosystem file — {{ apppm2_app.key }}
  ansible.builtin.debug:
    msg: >-
      {{ apppm2_app.key }}: pm2 processes {{ apppm2_app.value.process.pm2 }} declared but
      {{ apppm2_app.value.process.ecosystem | default('ecosystem.config.js') }} is
      missing in {{ apppm2_dir }} — add one to the app repo.
  when:
    - apppm2_app.value.process.pm2 | default([]) | length > 0
    - not (apppm2_eco.stat.exists | default(false))
