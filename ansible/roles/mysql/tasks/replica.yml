---
# Point the replica at the primary (over WireGuard) and start it.
#
# PREREQUISITE — bootstrap first: an empty server cannot catch up via
# AUTO_POSITION once the primary has purged the required GTIDs. Load a primary
# dump (mysqldump --set-gtid-purged=ON) BEFORE this runs. See the role README.
#
# Idempotent: we only (re)configure when replication is not already running, so
# a normal converge is a no-op. GET_SOURCE_PUBLIC_KEY=1 lets caching_sha2 auth
# succeed without TLS — the tunnel is the encryption.
- name: Read current replication status
  ansible.builtin.command:
    cmd: docker exec {{ mysql_container_name }} sh -c 'MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -N -e "SHOW REPLICA STATUS\G"'
  register: mysql_replica_status
  changed_when: false
  no_log: true

- name: Configure and start replication
  ansible.builtin.command:
    cmd: docker exec -i {{ mysql_container_name }} sh -c 'MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot'
    stdin: |
      STOP REPLICA;
      CHANGE REPLICATION SOURCE TO
        SOURCE_HOST='{{ mysql_replication_source_host }}',
        SOURCE_PORT={{ mysql_replication_source_port }},
        SOURCE_USER='{{ mysql_replication_user }}',
        SOURCE_PASSWORD='{{ mysql_replication_password }}',
        SOURCE_AUTO_POSITION=1,
        GET_SOURCE_PUBLIC_KEY=1;
      START REPLICA;
  register: mysql_replica_config
  no_log: true
  changed_when: true
  when:
    - mysql_replication_source_host | length > 0
    - mysql_replication_password | length > 0
    # Reconfigure when EITHER thread is down — not just IO. A stopped SQL
    # thread (IO: Yes / SQL: No, e.g. after STOP REPLICA SQL_THREAD) otherwise
    # skips this task AND the verify below (gated on `config is not skipped`),
    # so a half-dead replica reports green forever. STOP/CHANGE/START restarts
    # both; a persistent SQL data-error then re-fails verify → loud red, which
    # is the point. default('') keeps --check (status read skipped) from erroring.
    - >-
      'Replica_IO_Running: Yes' not in mysql_replica_status.stdout | default('')
      or 'Replica_SQL_Running: Yes' not in mysql_replica_status.stdout | default('')

# START REPLICA is fire-and-forget: it returns OK even when a thread dies
# immediately (bad credentials, purged GTIDs) — the error only surfaces in
# SHOW REPLICA STATUS. Poll until both threads run; the IO thread sits in
# Connecting for the first seconds on the WAN link, hence the retries. Only
# after a (re)configure — an unconditional check would fail every converge
# while a replica is broken for external reasons. Deliberately no no_log
# (unlike the rest of the role): SHOW REPLICA STATUS never prints the
# password, and Last_IO_Error / Last_SQL_Error must be visible on failure.
- name: Verify replication threads are running
  ansible.builtin.command:
    cmd: docker exec {{ mysql_container_name }} sh -c 'MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -N -e "SHOW REPLICA STATUS\G"'
  register: mysql_replica_verify
  until:
    - "'Replica_IO_Running: Yes' in mysql_replica_verify.stdout"
    - "'Replica_SQL_Running: Yes' in mysql_replica_verify.stdout"
  retries: 5
  delay: 3
  changed_when: false
  when: mysql_replica_config is not skipped
