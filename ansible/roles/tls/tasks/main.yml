---
# Per-zone wildcard certificates via Let's Encrypt DNS-01 (Cloudflare).
# Every TLS-managed host issues and renews its OWN lineages for every zone —
# TLS is fleet material: any web host can serve any domain the moment DNS
# points at it, and moving an app needs no certificate step at all (no
# lineage copying between hosts, unlike HTTP-01 which only works on the host
# DNS currently points to). Apps live on FIRST-level names only: *.vps.<zone>
# is the infra namespace (SSH host FQDNs), nothing serves HTTPS there.
#
# Renewal is certbot's stock systemd timer, local to each host. The LE
# duplicate-certificate limit is 5/week per identical SAN set — fine for a
# handful of web hosts, just don't bootstrap six new ones in one week.

# Per-task templating must hit a fact, not the inventory expression
# (site.yml resolves the op lookup itself once per run).
- name: Resolve the Cloudflare token once
  ansible.builtin.set_fact:
    tls_cf_api_token: "{{ tls_cf_api_token }}"
  no_log: true

- name: Refuse to run half-configured
  ansible.builtin.assert:
    that:
      - tls_zones | length > 0
      - tls_acme_email | length > 0
      - tls_cf_api_token | length > 0
    fail_msg: >-
      tls_managed is true but tls_zones / tls_acme_email (inventory, all:
      vars:) or tls_cf_api_token (a Cloudflare token with DNS:Edit on the
      tls_zones zones — vault or a 1Password lookup) is missing.
    quiet: true

- name: Install certbot + Cloudflare DNS plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-dns-cloudflare
      - acl # setfacl — netdata traverse grants below
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Cloudflare API credentials for DNS-01
  ansible.builtin.copy:
    dest: /etc/letsencrypt/dns-cloudflare.ini
    content: |
      # ANSIBLE MANAGED (tls role). Token scope: DNS:Edit on the tls_zones
      # zones only — it cannot touch other zones or account settings.
      dns_cloudflare_api_token = {{ tls_cf_api_token }}
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Ensure the renewal deploy-hook directory exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Reload nginx whenever any certificate renews
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx
    content: |
      #!/bin/sh
      # Deploy hooks only run after a successful renewal, so nginx (if
      # present) picks the fresh certificate up within the same minute.
      command -v nginx >/dev/null && nginx -t >/dev/null 2>&1 && systemctl reload nginx
      exit 0
    owner: root
    group: root
    mode: "0755"

# Every vhost includes /etc/letsencrypt/options-ssl-nginx.conf and
# /etc/letsencrypt/ssl-dhparams.pem. Historically certbot's --nginx INSTALLER
# wrote them; `certonly` with the DNS plugin never does — so a host rebuilt
# from the repo alone would fail nginx -t on the first TLS vhost. Vendored
# byte-identical to what certbot 2.9.0 ships (the Mozilla ssl-config options
# file and the RFC 7919 ffdhe2048 group — certbot copies these same files to
# everyone, it does not generate per-host dhparams).
- name: Install the TLS parameter files the vhosts include
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/letsencrypt/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop: [options-ssl-nginx.conf, ssl-dhparams.pem]
  notify: Reload nginx if present

# The lineage must track tls_zones: a `creates` guard would freeze each
# zone's SAN set at first issue, silently ignoring later inventory edits.
- name: Read the SAN set of each existing zone certificate
  ansible.builtin.shell:
    cmd: >-
      test -e /etc/letsencrypt/live/{{ item.key }}/cert.pem || exit 42;
      openssl x509 -noout -ext subjectAltName
      -in /etc/letsencrypt/live/{{ item.key }}/cert.pem
  loop: "{{ tls_zones | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: tls_zone_san_probe
  # rc 42 = no certificate yet — the "issue it" signal. Any OTHER failure
  # (openssl < 1.1.1 lacking -ext, unreadable file) must abort instead:
  # read as "issue it" it would reissue every run and burn the LE
  # duplicate limit from the header.
  failed_when: tls_zone_san_probe.rc not in [0, 42]
  changed_when: false
  # Read-only; --check must still see the real SAN state.
  check_mode: false

# Runs when the zone has no certificate or its SAN set differs from the
# inventory — compared as SETS, order noise must not reissue (the LE
# duplicate limit in the header is only 5/week). --cert-name pins the
# lineage, so certbot itself swaps the domain set in place; day-to-day
# renewals stay with the stock systemd timer.
- name: Issue per-zone wildcard certificates (new zone or changed SAN set)
  ansible.builtin.command:
    cmd: >-
      certbot certonly --non-interactive --agree-tos
      --email {{ tls_acme_email }}
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/letsencrypt/dns-cloudflare.ini
      --dns-cloudflare-propagation-seconds {{ tls_dns_propagation_seconds }}
      --cert-name {{ item.item.key }}
      -d {{ ([item.item.key] + item.item.value) | join(' -d ') }}
  changed_when: true
  loop: "{{ tls_zone_san_probe.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: >-
    item.rc != 0
    or (item.stdout | regex_findall('DNS:([^,\s]+)'))
       | symmetric_difference([item.item.key] + item.item.value)
       | length > 0

# Netdata's x509check reads the public fullchain files straight off the disk.
# certbot keeps live/ and archive/ at 0700 — grant the netdata user TRAVERSE
# only (x) on the directories: fullchain.pem is 0644 and becomes readable,
# privkey.pem stays 0600 root — never exposed. tls_extra_lineages (host_vars)
# covers legacy lineages outside tls_zones (e.g. edalle/recepter pending
# migration).
- name: Let netdata traverse the certificate directories
  ansible.posix.acl:
    path: "{{ item }}"
    entity: netdata
    etype: user
    permissions: x
    state: present
  vars:
    tls_all_lineages: "{{ (tls_zones | list) + (tls_extra_lineages | default([])) }}"
  loop: >-
    {{ ['/etc/letsencrypt/live', '/etc/letsencrypt/archive']
       + (tls_all_lineages | map('regex_replace', '^', '/etc/letsencrypt/live/') | list)
       + (tls_all_lineages | map('regex_replace', '^', '/etc/letsencrypt/archive/') | list) }}
