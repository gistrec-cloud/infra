---
# Per-zone wildcard certificates via Let's Encrypt DNS-01 (Cloudflare).
# Every TLS-managed host issues and renews its OWN lineages for every zone —
# TLS is fleet material: any web host can serve any domain the moment DNS
# points at it, and moving an app needs no certificate step at all (no
# lineage copying between hosts, unlike HTTP-01 which only works on the host
# DNS currently points to).
#
# Renewal is certbot's stock systemd timer, local to each host. The LE
# duplicate-certificate limit is 5/week per identical SAN set — fine for a
# handful of web hosts, just don't bootstrap six new ones in one week.

- name: Refuse to run half-configured
  ansible.builtin.assert:
    that:
      - tls_zones | length > 0
      - tls_acme_email | length > 0
      - vault_cf_acme_token | default('') | length > 0
    fail_msg: >-
      tls_managed is true but tls_zones / tls_acme_email (inventory, all:
      vars:) or vault_cf_acme_token (vault; Cloudflare token scoped to
      DNS:Edit on exactly the tls_zones zones) is missing.
    quiet: true

- name: Install certbot + Cloudflare DNS plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-dns-cloudflare
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Cloudflare API credentials for DNS-01
  ansible.builtin.copy:
    dest: /etc/letsencrypt/dns-cloudflare.ini
    content: |
      # ANSIBLE MANAGED (tls role). Token scope: DNS:Edit on the tls_zones
      # zones only — it cannot touch other zones or account settings.
      dns_cloudflare_api_token = {{ vault_cf_acme_token }}
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Ensure the renewal deploy-hook directory exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Reload nginx whenever any certificate renews
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx
    content: |
      #!/bin/sh
      # Deploy hooks only run after a successful renewal, so nginx (if
      # present) picks the fresh certificate up within the same minute.
      command -v nginx >/dev/null && nginx -t >/dev/null 2>&1 && systemctl reload nginx
      exit 0
    owner: root
    group: root
    mode: "0755"

- name: Issue per-zone wildcard certificates (first run only; the timer renews)
  ansible.builtin.command:
    cmd: >-
      certbot certonly --non-interactive --agree-tos
      --email {{ tls_acme_email }}
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/letsencrypt/dns-cloudflare.ini
      --dns-cloudflare-propagation-seconds {{ tls_dns_propagation_seconds }}
      --cert-name {{ item.key }}
      -d {{ ([item.key] + item.value) | join(' -d ') }}
    creates: "/etc/letsencrypt/live/{{ item.key }}/fullchain.pem"
  loop: "{{ tls_zones | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
