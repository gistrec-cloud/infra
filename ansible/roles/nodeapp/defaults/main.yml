---
# Fleet standard. NB: the role installs with `state: present`, so bumping this
# does NOT auto-upgrade an already-installed node — it flips the apt repo; a real
# major upgrade (e.g. finland-01 20→22) is a deliberate `apt install nodejs` + app restart.
nodeapp_nodejs_major: 22

# pm2-logrotate module settings (`pm2 set pm2-logrotate:<key> <value>`).
# Strings on purpose: module_conf.json stores strings and the role compares
# them as such to decide whether to re-set.
nodeapp_pm2_logrotate:
  max_size: "10M"
  retain: "14"

# List of Node apps managed by pm2; usually set per host in host_vars/.
# Each item: { name, repo, branch, cwd, script, instances, exec_mode, env }
nodeapp_node_apps: []
