---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodeapp_nodejs_major }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pm2 globally
  community.general.npm:
    name: pm2
    global: true
    state: present

# Boot resurrection: the same pm2-<user>.service every adopted host runs.
# `pm2 startup` is idempotent only by the unit file it writes, hence the
# creates guard; `pm2 save` is owned by the app roles (they save after
# starting processes).
- name: Enable pm2 resurrection at boot for the admin user
  ansible.builtin.command:
    cmd: >-
      pm2 startup systemd -u {{ admin_user }} --hp /home/{{ admin_user }}
    creates: "/etc/systemd/system/pm2-{{ admin_user }}.service"

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.cwd }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop: "{{ nodeapp_node_apps }}"
  loop_control:
    label: "{{ item.name }}"

- name: Deploy application code
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.cwd }}"
    version: "{{ item.branch | default('main') }}"
    accept_hostkey: true
  become: true
  become_user: "{{ admin_user }}"
  loop: "{{ nodeapp_node_apps }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload pm2

- name: Install production dependencies
  community.general.npm:
    path: "{{ item.cwd }}"
    production: true
    state: present
  become: true
  become_user: "{{ admin_user }}"
  loop: "{{ nodeapp_node_apps }}"
  loop_control:
    label: "{{ item.name }}"

- name: Render pm2 ecosystem file
  ansible.builtin.template:
    src: ecosystem.config.js.j2
    dest: "{{ item.cwd }}/ecosystem.config.js"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"
  loop: "{{ nodeapp_node_apps }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload pm2

- name: Start / reload apps under pm2
  ansible.builtin.command:
    cmd: pm2 startOrReload ecosystem.config.js
    chdir: "{{ item.cwd }}"
  become: true
  become_user: "{{ admin_user }}"
  register: nodeapp_pm2_reload
  changed_when: "'Applying action' in nodeapp_pm2_reload.stdout or 'Starting' in nodeapp_pm2_reload.stdout"
  loop: "{{ nodeapp_node_apps }}"
  loop_control:
    label: "{{ item.name }}"

- name: Enable pm2 boot service (systemd)
  # Runs as root (no become_user) — pm2 startup must write the systemd unit.
  ansible.builtin.command: "pm2 startup systemd -u {{ admin_user }} --hp /home/{{ admin_user }}"
  changed_when: false

- name: Persist the pm2 process list
  ansible.builtin.command: pm2 save
  become: true
  become_user: "{{ admin_user }}"
  changed_when: false
