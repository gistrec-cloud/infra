---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

# A hand-installed NodeSource source with a different Signed-By makes apt
# refuse to read sources at all (bit us on germany-01, 2026-07-18).
- name: Remove legacy hand-installed NodeSource source
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/nodesource.sources
    - /usr/share/keyrings/nodesource.gpg

- name: Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodeapp_nodejs_major }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pm2 globally
  community.general.npm:
    name: pm2
    global: true
    state: present

# Boot resurrection: the same pm2-<user>.service every adopted host runs.
# `pm2 startup` is idempotent only by the unit file it writes, hence the
# creates guard; app roles save the process list after changing it.
- name: Enable pm2 resurrection at boot for the admin user
  ansible.builtin.command:
    cmd: >-
      pm2 startup systemd -u {{ admin_user }} --hp /home/{{ admin_user }}
    creates: "/etc/systemd/system/pm2-{{ admin_user }}.service"

# pm2 never rotates ~/.pm2/logs — the pm2-logrotate module caps them
# (codifies what russia-01 runs hand-installed).
- name: Install the pm2-logrotate module
  ansible.builtin.command:
    cmd: pm2 install pm2-logrotate
    creates: "/home/{{ admin_user }}/.pm2/modules/pm2-logrotate"
  become: true
  become_user: "{{ admin_user }}"

# `pm2 set` rewrites module_conf.json and restarts the module every time —
# read the current values and set only what differs (a missing file is an
# empty config: the first run sets everything).
- name: Read the pm2 module configuration
  ansible.builtin.slurp:
    src: "/home/{{ admin_user }}/.pm2/module_conf.json"
  register: nodeapp_module_conf
  failed_when: false

- name: Configure pm2-logrotate
  ansible.builtin.command: "pm2 set pm2-logrotate:{{ item.key }} {{ item.value }}"
  become: true
  become_user: "{{ admin_user }}"
  changed_when: true
  vars:
    nodeapp_logrotate_conf: >-
      {{ (nodeapp_module_conf.content | default('{}' | b64encode)
          | b64decode | from_json)['pm2-logrotate'] | default({}) }}
  loop: "{{ nodeapp_pm2_logrotate | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  when: nodeapp_logrotate_conf[item.key] | default('') | string != item.value | string
