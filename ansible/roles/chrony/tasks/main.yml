---
# chrony Provides/Conflicts time-daemon, so apt swaps systemd-timesyncd out in
# the same transaction — no separate disable step needed.
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Deploy /etc/chrony/chrony.conf
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

- name: Enable and start chrony
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true
