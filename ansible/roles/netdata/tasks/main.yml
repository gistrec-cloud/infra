---
# The distro netdata package is ancient (v1.33 on Ubuntu 22.04, below the
# streaming-recommended v2.9) — use the official netdata repo, edge channel,
# matching the kickstart-installed parents. force: false keeps the files that
# the netdata-repo-edge package already manages on those parents.
- name: Install the official netdata repository key
  ansible.builtin.get_url:
    url: https://repo.netdata.cloud/netdatabot.gpg.key
    dest: /usr/share/keyrings/netdata-archive-keyring.asc
    mode: "0644"
    force: false

- name: Add the official netdata repository (edge channel)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/netdata-edge.sources
    content: |
      Types: deb
      URIs: http://repository.netdata.cloud/repos/edge/{{ ansible_distribution | lower }}/
      Suites: {{ ansible_distribution_release }}/
      Signed-By: /usr/share/keyrings/netdata-archive-keyring.asc
      By-Hash: Yes
      Enabled: Yes
    mode: "0644"
    force: false

# present, not latest: the edge channel updates daily and every run would
# upgrade-and-restart the agent. Upgrades are deliberate: apt on the host.
- name: Install netdata
  ansible.builtin.apt:
    name: netdata
    state: present
    update_cache: true

- name: Bind netdata to localhost only
  community.general.ini_file:
    path: /etc/netdata/netdata.conf
    section: web
    option: "bind to"
    value: "{{ netdata_bind_to }}"
    mode: "0644"
  notify: Restart netdata

- name: Restrict web connections by source
  community.general.ini_file:
    path: /etc/netdata/netdata.conf
    section: web
    option: "allow connections from"
    value: "{{ netdata_web_allow_from }}"
    mode: "0644"
  notify: Restart netdata

- name: Name the node after the inventory host
  community.general.ini_file:
    path: /etc/netdata/netdata.conf
    section: global
    option: hostname
    value: "{{ netdata_hostname }}"
    mode: "0644"
  notify: Restart netdata
  when: netdata_hostname | length > 0

# no_log: the rendered config carries the streaming API key.
- name: Configure metrics streaming (parent/child)
  ansible.builtin.template:
    src: stream.conf.j2
    dest: /etc/netdata/stream.conf
    owner: root
    group: netdata
    mode: "0640"
  no_log: true
  notify: Restart netdata
  when: >-
    netdata_stream_api_key | length > 0 and
    (netdata_stream_accept or netdata_stream_destination | length > 0)

# Monitoring follows the deployed apps: derive one group per nodeapp_node_apps
# entry so adding an app to host_vars wires its alert automatically. Manual
# netdata_pm2_apps entries keep priority (same name = derived entry skipped).
- name: Derive pm2 app groups from nodeapp_node_apps
  ansible.builtin.set_fact:
    netdata_pm2_apps: "{{ netdata_pm2_apps + [{'name': item.name, 'pattern': '*' ~ item.cwd ~ '/' ~ item.script ~ '*'}] }}"
  loop: "{{ nodeapp_node_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name not in (netdata_pm2_apps | map(attribute='name') | list)

# apps.plugin re-reads its groups only at startup, so both tasks below notify a
# full restart (reloading health alone is not enough).
- name: Read stock apps_groups.conf (appended after our pm2 groups)
  ansible.builtin.slurp:
    src: /usr/lib/netdata/conf.d/apps_groups.conf
  register: netdata_stock_apps_groups
  when: netdata_pm2_apps | length > 0

- name: Group pm2 app processes in apps.plugin
  ansible.builtin.template:
    src: apps_groups.conf.j2
    dest: /etc/netdata/apps_groups.conf
    mode: "0644"
  notify: Restart netdata
  when: netdata_pm2_apps | length > 0

# Liveness/memory/oom alarms install on the notifying evaluator only (parent or
# standalone) — the parent already evaluates streamed child charts, so installing
# on children too would double-notify. Children still set netdata_pm2_apps to stream.
- name: Alert when a pm2 app has no processes
  ansible.builtin.copy:
    src: pm2_health.conf
    dest: /etc/netdata/health.d/pm2.conf
    mode: "0644"
  notify: Restart netdata
  when: netdata_pm2_apps | length > 0 and netdata_stream_destination | length == 0

- name: Alert when a pm2 app's memory runs high (leak/OOM early warning)
  ansible.builtin.copy:
    src: pm2_memory.conf
    dest: /etc/netdata/health.d/pm2_memory.conf
    mode: "0644"
  notify: Restart netdata
  when: netdata_pm2_apps | length > 0 and netdata_stream_destination | length == 0

# Re-arm the stock oom_kill alarm (ships `to: silent`). Parent/standalone only.
- name: Notify on OOM kills (re-arm the silenced stock alarm)
  ansible.builtin.copy:
    src: oom_notify.conf
    dest: /etc/netdata/health.d/oom_notify.conf
    mode: "0644"
  notify: Restart netdata
  when: netdata_stream_destination | length == 0

# go.d re-reads job configs only at startup, hence the full restart.
- name: Configure go.d httpcheck probes
  ansible.builtin.template:
    src: httpcheck.conf.j2
    dest: /etc/netdata/go.d/httpcheck.conf
    mode: "0644"
  notify: Restart netdata
  when: netdata_httpcheck_jobs | length > 0

# Cert-expiry watchdog for tls-role hosts: reads lineages ON DISK (network
# checks through the Cloudflare proxy would show the edge cert, not ours).
# The tls role grants netdata traverse-only ACLs on the lineage dirs; the
# stock x509check health template alerts at the per-job thresholds.
- name: Configure go.d x509check (certificate expiry on disk)
  ansible.builtin.template:
    src: x509check.conf.j2
    dest: /etc/netdata/go.d/x509check.conf
    mode: "0644"
  notify: Restart netdata
  when: tls_managed | default(false)

# go.d re-reads job configs only at startup, hence the full restart.
- name: Configure go.d filecheck (backup-freshness markers)
  ansible.builtin.template:
    src: filecheck.conf.j2
    dest: /etc/netdata/go.d/filecheck.conf
    mode: "0644"
  notify: Restart netdata
  when: netdata_filecheck_files | length > 0

- name: Install custom health alarm files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/{{ item }}"
    dest: "/etc/netdata/health.d/{{ item | basename }}"
    mode: "0644"
  loop: "{{ netdata_health_files }}"
  notify: Restart netdata

# alarm-notify.sh re-reads this file on every notification — no restart needed.
# no_log: the rendered file carries the Telegram token and Pushover keys.
- name: Send health alerts (Telegram + Pushover escalation)
  ansible.builtin.template:
    src: health_alarm_notify.conf.j2
    dest: /etc/netdata/health_alarm_notify.conf
    owner: root
    group: netdata
    mode: "0640"
  no_log: true
  when: netdata_telegram_bot_token | length > 0 and netdata_telegram_chat_id | length > 0

- name: Enable and start netdata
  ansible.builtin.service:
    name: netdata
    enabled: true
    state: started
