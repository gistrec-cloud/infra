# Un-silences the fleet's OOM visibility. The stock `oom_kill` alarm ships with
# `to: silent`, so a kernel OOM-kill currently notifies nobody. This companion
# alarm on the same chart pages sysadmin (Telegram) when any process was
# OOM-killed in the last 10m. A separate name (not an override of the stock
# alarm) so a netdata edge update can't silently revert it. Parent-only: it
# also evaluates streamed children's mem.oom_kill, covering the whole fleet.
    alarm: oom_kill_notify
       on: mem.oom_kill
host labels: _os=linux
   lookup: sum -10m unaligned
    units: kills
    every: 1m
     warn: $this > 0
    delay: up 0 down 10m
  summary: OOM kill detected
     info: the kernel OOM-killed one or more processes in the last 10 minutes
       to: sysadmin
