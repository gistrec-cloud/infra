# pm2 process liveness alert — one template covers every apps.plugin group with
# the pm2_ prefix (the netdata role renders one group per `netdata_pm2_apps`
# entry into apps_groups.conf). `max of last 30s < 1` means the group had no
# processes for 30s straight, so quick pm2 autorestarts don't flap the alarm.
# Caveats:
#  - health instantiates alarms ~1 min AFTER netdata (re)starts; checking the
#    alarms API earlier gives a false negative.
#  - if netdata restarts while an app is already down, the app's chart does not
#    exist yet and the alarm stays silent until the app has run at least once.
 template: pm2_app_down
       on: app.processes
    class: Availability
     type: System
component: pm2
chart labels: app_group=pm2_*
   lookup: max -30s unaligned of processes
    units: processes
    every: 10s
     crit: $this < 1
  summary: pm2 app ${label:app_group} is down
     info: pm2 app ${label:app_group} has had no running processes for 30+ seconds
       to: sysadmin
