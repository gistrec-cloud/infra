# pm2 per-app memory alert — pairs with pm2.conf (liveness). Fires when a
# pm2_* apps.plugin group's aggregate RSS stays high, catching a leak/runaway
# before the kernel OOM-kills it (oom_notify.conf catches the actual kill).
# Absolute MiB across all groups (the apps normally sit at ~0.1-0.9 GiB) — tune
# the thresholds here. Parent-only, same as pm2.conf: it evaluates streamed
# children's charts too, so one copy covers the whole fleet.
 template: pm2_app_mem_high
       on: app.mem_usage
    class: Utilization
     type: System
component: pm2
chart labels: app_group=pm2_*
   lookup: average -1m unaligned of rss
    units: MiB
    every: 30s
     warn: $this > 1500
     crit: $this > 2500
    delay: down 5m multiplier 1.5 max 1h
  summary: pm2 app ${label:app_group} memory high
     info: pm2 app ${label:app_group} RSS averaged >1500 MiB for 1m (leak/runaway, OOM risk)
       to: sysadmin
