---
# Extra inbound TCP ports to open (besides SSH, 80, 443).
firewall_extra_open_tcp_ports: []

# Inbound TCP ports open only to specific source IPs — e.g. netdata streaming
# (19999) from child hosts to the parent. Entries: {port: 19999, from: 203.0.113.7}
firewall_allow_tcp: []

# Inbound UDP ports open only to specific source IPs — e.g. WireGuard (51820)
# from mesh peers. Entries: {port: 51820, from: 203.0.113.7}
firewall_allow_udp: []

# TCP ports of Docker-published services, restricted by source IP. External
# traffic to a published port is DNAT'ed before routing and traverses the
# *forward* chain (never input), so it needs its own accept there.
# Entries: {port: 8123, from: 203.0.113.7}
firewall_docker_allow_tcp: []

# fail2ban tuning
firewall_fail2ban_bantime: "1h"
firewall_fail2ban_findtime: "10m"
firewall_fail2ban_maxretry: 5

# IPs fail2ban must never ban (all jails). Real values (your home IP, …) are
# live data — override in the gitignored inventory (all: vars:).
firewall_fail2ban_ignoreip: "127.0.0.1/8 ::1"

# nginx-honeypot jail: the nginx role's honeypot.conf snippet logs scanner
# probes of trap paths (/.env, /wp-login.php, …) to honeypot.log; one hit =
# an immediate all-ports ban. Defaults to web hosts — the log only exists
# where nginx serves the snippet.
firewall_nginx_honeypot: "{{ 'web' in group_names }}"

# Second arm of the honeypot ban: mirror it as an account-level Cloudflare IP
# Access Rule, so the ban also holds for proxied vhosts (their connections
# always arrive from CF edges — nftables alone can't cut them). Empty token =
# nftables only. Real values live in the gitignored inventory (all: vars:);
# the token is 1P item cf-firewall-token.
firewall_cf_api_token: ""
firewall_cf_account_id: ""
