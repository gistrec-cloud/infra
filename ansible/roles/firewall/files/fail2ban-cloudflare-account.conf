# Ansible-managed (roles/firewall). Account-level Cloudflare IP Access Rules:
# one POST blocks the IP across every zone in the account, DELETE lifts it.
# fail2ban's bantime.increment drives the lifetime — actionunban fires when
# the (escalating) bantime expires. Zone-scoped stock cloudflare-token.conf
# would need one action per zone; the account endpoint covers all 7 at once.
[Definition]
actionstart =
actionstop =
actioncheck =
# `curl -s` returns 0 on HTTP 401/403/5xx, so a stale/under-scoped token or a
# CF outage used to fail silently. Capture the body and surface anything that
# is not a CF `"success":true` to syslog. A duplicate ban (the 4 web hosts ban
# the same scanner IP account-wide, independently) comes back as an error but
# is benign — match `duplicate` and treat it as success so it never alerts.
actionban = resp=$(curl -s --show-error --max-time 15 -X POST <_cf_api_prms> --data '{"mode":"block","configuration":{"target":"<cftarget>","value":"<ip>"},"notes":"fail2ban <name>"}' "<_cf_api_url>" 2>&1); \
            case "$resp" in *'"success":true'*|*duplicate*) : ;; *) logger -t fail2ban-cloudflare "account ban of <ip> failed: $resp" ;; esac
actionunban = resp=$(curl -s --show-error --max-time 15 -X GET <_cf_api_prms> "<_cf_api_url>?configuration.target=<cftarget>&configuration.value=<ip>&page=1&per_page=1" 2>&1); \
              id=$(printf '%%s' "$resp" | python3 -c "import sys,json;r=(json.load(sys.stdin).get('result') or []);print(r[0]['id'] if r else '')" 2>/dev/null); \
              if [ -n "$id" ]; then \
                dresp=$(curl -s --show-error --max-time 15 -X DELETE <_cf_api_prms> "<_cf_api_url>/$id" 2>&1); \
                case "$dresp" in *'"success":true'*) : ;; *) logger -t fail2ban-cloudflare "account unban of <ip> (rule $id) failed: $dresp" ;; esac; \
              else \
                case "$resp" in *'"success":true'*) : ;; *) logger -t fail2ban-cloudflare "account unban lookup for <ip> failed: $resp" ;; esac; \
              fi

_cf_api_url = https://api.cloudflare.com/client/v4/accounts/<cfaccount>/firewall/access_rules/rules
_cf_api_prms = -H 'Authorization: Bearer <cftoken>' -H 'Content-Type: application/json'

[Init]
cftoken =
cfaccount =
cftarget = ip

[Init?family=inet6]
cftarget = ip6
