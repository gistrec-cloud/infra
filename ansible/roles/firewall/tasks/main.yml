---
# when:/template evaluations must hit a fact, not the op-backed lookup.
- name: Resolve the Cloudflare token once
  ansible.builtin.set_fact:
    firewall_cf_api_token: "{{ firewall_cf_api_token }}"
  no_log: true

- name: Install nftables and fail2ban
  ansible.builtin.apt:
    name:
      - nftables
      - fail2ban
    state: present
    update_cache: true

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: Enable and start nftables
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

- name: Configure fail2ban jails
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

# ── nginx-honeypot jail (web hosts) ──
# Deployed under the same jail.d/filter.d names the hand-made setup used, so
# adoption overwrites in place. The firewall role runs before nginx exists on
# a fresh host, hence the dir + log pre-touch — fail2ban refuses a jail whose
# logpath is missing.
- name: Ensure the nginx log directory exists
  ansible.builtin.file:
    path: /var/log/nginx
    state: directory
    owner: root
    group: adm
    mode: "0750"
  # `web`, not the honeypot flag: the error.log pre-touch below needs it too.
  when: "'web' in group_names"

- name: Ensure the honeypot log exists before fail2ban tails it
  ansible.builtin.copy:
    content: ""
    dest: /var/log/nginx/honeypot.log
    force: false
    owner: root
    group: adm
    mode: "0640"
  when: firewall_nginx_honeypot | bool

# nginx-http-auth jail logpath — same fresh-host reason as the honeypot log.
- name: Ensure the nginx error log exists before fail2ban tails it
  ansible.builtin.copy:
    content: ""
    dest: /var/log/nginx/error.log
    force: false
    owner: root
    group: adm
    mode: "0640"
  when: "'web' in group_names"

- name: Install the nginx-honeypot filter
  ansible.builtin.copy:
    src: nginx-honeypot-filter.conf
    dest: /etc/fail2ban/filter.d/nginx-honeypot.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban
  when: firewall_nginx_honeypot | bool

- name: Install the Cloudflare account-level ban action
  ansible.builtin.copy:
    src: fail2ban-cloudflare-account.conf
    dest: /etc/fail2ban/action.d/cloudflare-account.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban
  when:
    - firewall_nginx_honeypot | bool
    - firewall_cf_api_token | length > 0

# Orphan sweep: fail2ban unbans (= deletes the CF rule) only while its host
# lives; a retired host would leave its rules in CF forever. Every web host
# sweeps daily, so losing any single host can't make a ban eternal.
- name: Install the CF ban sweeper (mode 0700 — the script embeds the token)
  ansible.builtin.template:
    src: cf-ban-sweeper.py.j2
    dest: /usr/local/sbin/cf-ban-sweeper
    owner: root
    group: root
    mode: "0700"
  when:
    - firewall_nginx_honeypot | bool
    - firewall_cf_api_token | length > 0

- name: Schedule the CF ban sweeper daily
  ansible.builtin.copy:
    content: |
      # Ansible-managed (roles/firewall): daily orphan sweep of fail2ban CF rules.
      17 4 * * * root /usr/local/sbin/cf-ban-sweeper
    dest: /etc/cron.d/cf-ban-sweeper
    owner: root
    group: root
    mode: "0644"
  when:
    - firewall_nginx_honeypot | bool
    - firewall_cf_api_token | length > 0

# mode 0600: the jail file embeds the CF API token (cloudflare-account action).
- name: Enable the nginx-honeypot jail
  ansible.builtin.template:
    src: nginx-honeypot-jail.conf.j2
    dest: /etc/fail2ban/jail.d/nginx-honeypot.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart fail2ban
  when: firewall_nginx_honeypot | bool

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
