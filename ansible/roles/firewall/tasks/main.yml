---
- name: Install nftables and fail2ban
  ansible.builtin.apt:
    name:
      - nftables
      - fail2ban
    state: present
    update_cache: true

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: Enable and start nftables
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

- name: Configure fail2ban jails
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
